services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    volumes:
      # Your repo on the host → same files in the container
      - ..:/workspace:cached
      # Linux deps live only in the container (avoids host ↔ container node_modules clashes)
      - node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    # Keep the container running so the editor can attach
    command: tail -f /dev/null

volumes:
  node_modules:
