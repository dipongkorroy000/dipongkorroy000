services:
  app:
    image: node:20-alpine
    container_name: dipongkorroy000-dev
    working_dir: /app
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm i -g pnpm && pnpm install && pnpm dev -H 0.0.0.0 -p 3000"

volumes:
  node_modules:
